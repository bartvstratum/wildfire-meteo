<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Wildfire meteo analysis tool</title>
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
        <link rel="stylesheet" href="style.css">
        <script src="https://d3js.org/d3.v7.min.js"></script>
    </head>

    <body>

        <header>🌳 Wildfire meteo analysis tool 🔥</header>
        <main>
            <aside class="sidebar left">
                <h3>Settings</h3>
                <label>
                    Latitude
                    <input type="text" placeholder="52.0">
                </label>
                <label>
                    Longitude
                    <input type="text" placeholder="6">
                </label>
                <label>
                    Surface temperature
                    <input type="range" min="-10" max="45" value="20">
                </label>
                <label>
                    Surface humidity
                    <input type="range" min="-10" max="45" value="20">
                </label>
                <label>
                    Fire area
                    <input type="range" min="-10" max="45" value="20">
                </label>
            </aside>

            <section class="plot">
                <svg id="skewt" style="width:100%;height:100%;display:block;"></svg>
            </section>

            <aside class="sidebar right">
                <h3>Sounding data</h3>
                <button>Fetch model data</button>
                <button>Fetch nearest sounding</button>
                <button>Upload sounding</button>
            </aside>
        </main>

        <script src="skewt.js"></script>

    </body>
</html>
